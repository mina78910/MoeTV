<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>録画DVD番組ライブラリ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3eb;
      --panel: rgba(255, 255, 255, 0.9);
      --ink: #27313f;
      --muted: #687386;
      --accent: #6f5de7;
      --accent-2: #19a7a8;
      --danger: #c63848;
      --ring: rgba(111, 93, 231, 0.28);
      --shadow: 0 18px 45px rgba(42, 39, 58, 0.16);
      --radius: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 201, 121, 0.38), transparent 34rem),
        radial-gradient(circle at 90% 8%, rgba(119, 215, 216, 0.34), transparent 28rem),
        linear-gradient(135deg, #fbf7ef 0%, var(--bg) 55%, #eef7f7 100%);
    }

    body.modal-open { overflow: hidden; }
    button, input, textarea { font: inherit; }
    [hidden] { display: none !important; }

    .app-shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: clamp(12px, 3vw, 28px);
    }

    .viewer-card {
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .toolbar {
      position: sticky;
      top: 12px;
      z-index: 10;
      display: grid;
      gap: 14px;
      margin-bottom: 20px;
      padding: 16px;
    }

    .toolbar-header,
    .toolbar-actions,
    .modal-header,
    .form-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toolbar-title {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 950;
    }

    .toolbar-header-actions,
    .toolbar-actions,
    .form-actions { flex-wrap: wrap; }

    .toolbar-toggle, .toolbar-open-fixed, .primary-button,
    .secondary-button, .danger-button, .chip-button, .icon-button {
      border: 0;
      border-radius: 999px;
      padding: 10px 15px;
      font-weight: 950;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .toolbar-toggle, .toolbar-open-fixed, .primary-button {
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 22px rgba(42, 39, 58, 0.16);
    }

    .secondary-button {
      color: var(--accent);
      background: rgba(111, 93, 231, 0.12);
    }

    .danger-button {
      color: #fff;
      background: var(--danger);
    }

    button:hover, button:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(42, 39, 58, 0.14);
      outline: none;
    }

    .toolbar-open-fixed {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      z-index: 60;
      padding: 11px 18px;
    }

    .toolbar-content, .search-grid { display: grid; gap: 14px; }

    .search-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .field {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-weight: 900;
    }

    .field input, .field textarea {
      width: 100%;
      border: 1px solid rgba(104, 115, 134, 0.24);
      border-radius: 18px;
      padding: 11px 14px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.82);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .field input:focus, .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--ring);
    }

    .field textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.65;
    }

    .filter-summary {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(111, 93, 231, 0.08);
    }

    .summary-row, .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .summary-label {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 950;
    }

    .chip, .chip-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      color: white;
      background: rgba(39, 49, 63, 0.72);
      font-size: 0.82rem;
      font-weight: 900;
      line-height: 1;
    }

    .exclude-chip { background: rgba(198, 56, 72, 0.9); }
    .chip-button { border: 0; cursor: pointer; }
    .chip-button::after { content: "×"; opacity: 0.82; }

    .result-count {
      margin: 0 0 0 auto;
      color: var(--muted);
      font-weight: 950;
      text-align: right;
    }

    .record-list {
      display: grid;
      gap: 12px;
    }

    .record-card {
      width: 100%;
      display: grid;
      grid-template-columns: 130px 150px 1fr minmax(180px, 0.7fr);
      gap: 12px;
      align-items: center;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 22px;
      color: inherit;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 10px 28px rgba(42, 39, 58, 0.1);
      text-align: left;
      cursor: pointer;
    }

    .record-card:hover, .record-card:focus-visible {
      transform: translateY(-3px);
      box-shadow: 0 18px 42px rgba(42, 39, 58, 0.16);
    }

    .meta-label {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 900;
    }

    .meta-value {
      display: block;
      margin-top: 4px;
      font-size: 1rem;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .title-value { font-size: 1.08rem; }
    .empty-message { padding: 32px; text-align: center; color: var(--muted); font-weight: 900; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      background: rgba(39, 49, 63, 0.42);
    }

    .modal {
      width: min(720px, 100%);
      max-height: min(86dvh, 760px);
      overflow: auto;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 28px 70px rgba(18, 21, 30, 0.32);
    }

    .modal h2 { margin: 0; font-size: 1.35rem; }
    .icon-button { width: 38px; height: 38px; padding: 0; color: var(--muted); background: rgba(104, 115, 134, 0.14); }
    .detail-grid { display: grid; gap: 12px; margin: 16px 0; }
    .detail-item { padding: 12px; border-radius: 16px; background: rgba(111, 93, 231, 0.08); }
    .detail-item p { margin: 5px 0 0; line-height: 1.7; white-space: pre-wrap; overflow-wrap: anywhere; }

    @media (max-width: 860px) {
      .search-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .record-card { grid-template-columns: 1fr 1fr; }
      .record-card .title-cell, .record-card .tag-cell { grid-column: 1 / -1; }
    }

    @media (max-width: 560px) {
      .app-shell { padding: 12px; }
      .toolbar { padding: 14px; border-radius: 20px; position: static; }
      .toolbar-header, .modal-header, .form-actions { align-items: stretch; }
      .toolbar-header { flex-direction: column; }
      .toolbar-header-actions, .toolbar-header-actions > button, .toolbar-actions > button, .form-actions > button { width: 100%; }
      .result-count { width: 100%; margin-left: 0; }
      .search-grid { grid-template-columns: 1fr; }
      .record-card { grid-template-columns: 1fr; padding: 14px; }
      .modal { max-height: calc(100dvh - 24px); padding: 14px; border-radius: 20px; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <button id="toolbarOpenFixed" class="toolbar-open-fixed" type="button" hidden>メニューを開く</button>

    <section id="toolbar" class="toolbar viewer-card" aria-label="検索メニュー">
      <div class="toolbar-header">
        <p class="toolbar-title">検索・操作メニュー</p>
        <div class="toolbar-header-actions">
          <button id="newButton" class="primary-button" type="button">新規登録</button>
          <button id="toolbarToggle" class="toolbar-toggle" type="button" aria-expanded="true" aria-controls="toolbarContent">メニューを閉じる</button>
        </div>
      </div>

      <div id="toolbarContent" class="toolbar-content">
        <div class="search-grid">
          <label class="field" for="dvdNumberInput">DVD番号<input id="dvdNumberInput" type="search" placeholder="例: DVD-001" autocomplete="off"></label>
          <label class="field" for="broadcastDateInput">放送日<input id="broadcastDateInput" type="date"></label>
          <label class="field" for="titleInput">番組名・タイトル<input id="titleInput" type="search" placeholder="タイトルの一部" autocomplete="off"></label>
          <label class="field" for="tagInput">タグ検索<input id="tagInput" type="search" placeholder="例: ドラマ 音楽" autocomplete="off"></label>
          <label class="field" for="excludeTagInput">除外タグ<input id="excludeTagInput" type="search" placeholder="例: CMカット済 旧版" autocomplete="off"></label>
        </div>

        <div class="filter-summary" aria-live="polite">
          <div id="activeConditions" class="summary-row"></div>
          <div id="includeTagSummary" class="summary-row"></div>
          <div id="excludeTagSummary" class="summary-row"></div>
        </div>

        <div class="toolbar-actions">
          <button id="clearFiltersButton" class="secondary-button" type="button">検索条件を一括解除</button>
          <p id="resultCount" class="result-count" aria-live="polite">検索結果 0件</p>
        </div>
      </div>
    </section>


    <section id="recordList" class="record-list" aria-label="検索結果一覧"></section>
  </main>

  <div id="detailModal" class="modal-backdrop" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <div class="modal-header">
        <h2 id="detailTitle">番組詳細</h2>
        <button class="icon-button" type="button" data-close-modal aria-label="詳細を閉じる">×</button>
      </div>
      <div id="detailBody" class="detail-grid"></div>
      <div class="form-actions">
        <button id="editButton" class="secondary-button" type="button">編集</button>
        <button id="deleteButton" class="danger-button" type="button">削除</button>
      </div>
    </section>
  </div>

  <div id="formModal" class="modal-backdrop" hidden>
    <form id="recordForm" class="modal" role="dialog" aria-modal="true" aria-labelledby="formTitle">
      <div class="modal-header">
        <h2 id="formTitle">番組登録</h2>
        <button class="icon-button" type="button" data-close-modal aria-label="フォームを閉じる">×</button>
      </div>
      <div class="detail-grid">
        <label class="field" for="formDvdNumber">DVD番号<input id="formDvdNumber" name="dvdNumber" type="text" required placeholder="DVD-001"></label>
        <label class="field" for="formBroadcastDate">放送日<input id="formBroadcastDate" name="broadcastDate" type="date" required></label>
        <label class="field" for="formTitleInput">番組名・タイトル<input id="formTitleInput" name="title" type="text" required placeholder="番組タイトル"></label>
        <label class="field" for="formTags">タグ<input id="formTags" name="tags" type="text" placeholder="カンマ、読点、スペース区切りで入力"></label>
        <label class="field" for="formNotes">詳細メモ<textarea id="formNotes" name="notes" placeholder="出演者、収録内容、補足メモなど"></textarea></label>
      </div>
      <div class="form-actions">
        <button class="primary-button" type="submit">保存</button>
        <button class="secondary-button" type="button" data-close-modal>キャンセル</button>
      </div>
    </form>
  </div>

    let selectedProgramId = "";
    let editingProgramId = "";

    const selectors = {

      resultCount: document.querySelector("#resultCount"),
      recordList: document.querySelector("#recordList"),
      detailModal: document.querySelector("#detailModal"),
      detailBody: document.querySelector("#detailBody"),
      editButton: document.querySelector("#editButton"),
      deleteButton: document.querySelector("#deleteButton"),
      formModal: document.querySelector("#formModal"),
      recordForm: document.querySelector("#recordForm"),
      formTitle: document.querySelector("#formTitle")
    };

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[char]));
    }

    function splitTags(value) {
      return String(value || "").split(/[\s,、]+/).map((tag) => tag.trim()).filter(Boolean);
    }

    function uniqueTags(tags) {
      const tagMap = new Map();
      tags.forEach((tag) => {
        const normalized = String(tag || "").trim();
        if (normalized && !tagMap.has(normalized.toLowerCase())) tagMap.set(normalized.toLowerCase(), normalized);
      });
      return [...tagMap.values()];
    }

    function formatDate(value) {
      if (!value) return "未設定";
      return new Intl.DateTimeFormat("ja-JP", { dateStyle: "medium" }).format(new Date(`${value}T00:00:00`));
    }

    function formatDateTime(value) {
      return new Intl.DateTimeFormat("ja-JP", { dateStyle: "medium", timeStyle: "short" }).format(new Date(value));
    }

    function getFilters() {
      return {
        dvdNumber: selectors.dvdNumberInput.value.trim().toLowerCase(),
        broadcastDate: selectors.broadcastDateInput.value,
        title: selectors.titleInput.value.trim().toLowerCase(),
        includeTags: splitTags(selectors.tagInput.value).map((tag) => tag.toLowerCase()),
        excludeTags: splitTags(selectors.excludeTagInput.value).map((tag) => tag.toLowerCase())
      };
    }

    function matchesFilters(program, filters) {
      const tagKeys = program.tags.map((tag) => tag.toLowerCase());
      const dvdMatch = !filters.dvdNumber || program.dvdNumber.toLowerCase().includes(filters.dvdNumber);
      const dateMatch = !filters.broadcastDate || program.broadcastDate === filters.broadcastDate;
      const titleMatch = !filters.title || program.title.toLowerCase().includes(filters.title);
      const includeMatch = !filters.includeTags.length || filters.includeTags.every((term) => tagKeys.some((tag) => tag.includes(term)));
      const excludeMatch = filters.excludeTags.some((term) => tagKeys.some((tag) => tag.includes(term)));
      return dvdMatch && dateMatch && titleMatch && includeMatch && !excludeMatch;
    }

    function getVisiblePrograms() {
      const filters = getFilters();
      return programs
        .filter((program) => matchesFilters(program, filters))
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt) || a.title.localeCompare(b.title, "ja"));
    }

    function chipButton(label, type, value, extraClass = "") {
      return `<button class="chip-button ${extraClass}" type="button" data-clear-type="${type}" data-clear-value="${escapeHtml(value)}">${escapeHtml(label)}</button>`;
    }

    function renderFilterSummary() {
      const filters = getFilters();
      const conditionChips = [];
      if (filters.dvdNumber) conditionChips.push(chipButton(`DVD番号: ${selectors.dvdNumberInput.value.trim()}`, "dvdNumber", ""));
      if (filters.broadcastDate) conditionChips.push(chipButton(`放送日: ${formatDate(filters.broadcastDate)}`, "broadcastDate", ""));
      if (filters.title) conditionChips.push(chipButton(`タイトル: ${selectors.titleInput.value.trim()}`, "title", ""));
      selectors.activeConditions.innerHTML = `<span class="summary-label">個別条件</span>${conditionChips.join("") || "<span class='summary-label'>指定なし</span>"}`;

      const includeTags = splitTags(selectors.tagInput.value);
      selectors.includeTagSummary.innerHTML = `<span class="summary-label">検索タグ</span>${includeTags.map((tag) => chipButton(tag, "includeTag", tag)).join("") || "<span class='summary-label'>指定なし</span>"}`;

      const excludeTags = splitTags(selectors.excludeTagInput.value);
      selectors.excludeTagSummary.innerHTML = `<span class="summary-label">除外タグ</span>${excludeTags.map((tag) => chipButton(tag, "excludeTag", tag, "exclude-chip")).join("") || "<span class='summary-label'>指定なし</span>"}`;
    }

    function renderProgramList() {
      const visiblePrograms = getVisiblePrograms();
      selectors.resultCount.textContent = `検索結果 ${visiblePrograms.length}件 / 全${programs.length}件`;
      renderFilterSummary();

      if (!visiblePrograms.length) {
        selectors.recordList.innerHTML = `<p class="empty-message viewer-card">条件に一致する番組がありません。検索条件を変更してください。</p>`;
        return;
      }

      selectors.recordList.innerHTML = visiblePrograms.map((program) => `
        <button class="record-card" type="button" data-id="${escapeHtml(program.id)}" aria-label="${escapeHtml(program.title)}の詳細を開く">
          <span><span class="meta-label">DVD番号</span><span class="meta-value">${escapeHtml(program.dvdNumber)}</span></span>
          <span><span class="meta-label">放送日</span><span class="meta-value">${escapeHtml(formatDate(program.broadcastDate))}</span></span>
          <span class="title-cell"><span class="meta-label">番組名・タイトル</span><span class="meta-value title-value">${escapeHtml(program.title)}</span></span>
          <span class="tag-cell"><span class="meta-label">タグ</span><span class="tag-list">${program.tags.map((tag) => `<span class="chip">${escapeHtml(tag)}</span>`).join("") || "<span class='meta-value'>タグなし</span>"}</span></span>
        </button>
      `).join("");
    }

    function getProgramById(id) {
      return programs.find((program) => program.id === id);
    }

    function openModal(modal) {
      modal.hidden = false;
      document.body.classList.add("modal-open");
      modal.querySelector("button, input, textarea")?.focus();
    }

    function closeModals() {
      selectors.detailModal.hidden = true;
      selectors.formModal.hidden = true;
      document.body.classList.remove("modal-open");
    }

    function openDetail(id) {
      const program = getProgramById(id);
      if (!program) return;
      selectedProgramId = id;
      selectors.detailBody.innerHTML = `
        <div class="detail-item"><span class="meta-label">id</span><p>${escapeHtml(program.id)}</p></div>
        <div class="detail-item"><span class="meta-label">DVD番号</span><p>${escapeHtml(program.dvdNumber)}</p></div>
        <div class="detail-item"><span class="meta-label">放送日</span><p>${escapeHtml(formatDate(program.broadcastDate))}</p></div>
        <div class="detail-item"><span class="meta-label">番組名・タイトル</span><p>${escapeHtml(program.title)}</p></div>
        <div class="detail-item"><span class="meta-label">タグ</span><p>${program.tags.map((tag) => `<span class="chip">${escapeHtml(tag)}</span>`).join(" ") || "タグなし"}</p></div>
        <div class="detail-item"><span class="meta-label">詳細メモ</span><p>${escapeHtml(program.notes || "未入力")}</p></div>
        <div class="detail-item"><span class="meta-label">レコード作成日時</span><p>${escapeHtml(formatDateTime(program.createdAt))}</p></div>
      `;
      openModal(selectors.detailModal);
    }

    function openForm(program = null) {
      editingProgramId = program?.id || "";
      selectors.formTitle.textContent = program ? "番組編集" : "番組登録";
      selectors.recordForm.elements.namedItem("dvdNumber").value = program?.dvdNumber || "";
      selectors.recordForm.elements.namedItem("broadcastDate").value = program?.broadcastDate || "";
      selectors.recordForm.elements.namedItem("title").value = program?.title || "";
      selectors.recordForm.elements.namedItem("tags").value = program?.tags.join(" ") || "";
      selectors.recordForm.elements.namedItem("notes").value = program?.notes || "";
      openModal(selectors.formModal);
    }

    function saveProgram(formData) {
      const payload = {
        dvdNumber: formData.get("dvdNumber").trim(),
        broadcastDate: formData.get("broadcastDate"),
        title: formData.get("title").trim(),
        tags: uniqueTags(splitTags(formData.get("tags"))),
        notes: formData.get("notes").trim()
      };

      if (editingProgramId) {
        programs = programs.map((program) => program.id === editingProgramId ? { ...program, ...payload } : program);
        selectedProgramId = editingProgramId;
      } else {
        const now = new Date().toISOString();
        const generatedId = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
        selectedProgramId = `program-${generatedId}`;
        programs = [{ id: selectedProgramId, ...payload, createdAt: now }, ...programs];
      }
    }

    function deleteSelectedProgram() {
      const program = getProgramById(selectedProgramId);
      if (!program) return;
      if (!window.confirm(`「${program.title}」を削除しますか？\nこの操作は現在のブラウザ上のデータから番組レコードを削除します。`)) return;
      programs = programs.filter((item) => item.id !== selectedProgramId);
      selectedProgramId = "";
      closeModals();
      renderProgramList();
    }

    function removeTagFromInput(input, tagToRemove) {
      input.value = splitTags(input.value).filter((tag) => tag.toLowerCase() !== tagToRemove.toLowerCase()).join(" ");
    }

    function clearCondition(type, value) {
      if (type === "dvdNumber") selectors.dvdNumberInput.value = "";
      if (type === "broadcastDate") selectors.broadcastDateInput.value = "";
      if (type === "title") selectors.titleInput.value = "";
      if (type === "includeTag") removeTagFromInput(selectors.tagInput, value);
      if (type === "excludeTag") removeTagFromInput(selectors.excludeTagInput, value);
      renderProgramList();
    }

    function setToolbarExpanded(isExpanded) {
      selectors.toolbarContent.hidden = !isExpanded;
      selectors.toolbarToggle.setAttribute("aria-expanded", String(isExpanded));
      selectors.toolbarToggle.textContent = isExpanded ? "メニューを閉じる" : "メニューを開く";
    }

    function setToolbarVisible(isVisible) {
      selectors.toolbar.hidden = !isVisible;
      selectors.toolbarOpenFixed.hidden = isVisible;
    }

    [selectors.dvdNumberInput, selectors.broadcastDateInput, selectors.titleInput, selectors.tagInput, selectors.excludeTagInput]
      .forEach((input) => input.addEventListener("input", renderProgramList));

    selectors.recordList.addEventListener("click", (event) => {
      const card = event.target.closest(".record-card");
      if (card) openDetail(card.dataset.id);
    });

    document.addEventListener("click", (event) => {
      const clearButton = event.target.closest("[data-clear-type]");
      if (clearButton) clearCondition(clearButton.dataset.clearType, clearButton.dataset.clearValue);
    });

    selectors.newButton.addEventListener("click", () => openForm());
    selectors.editButton.addEventListener("click", () => openForm(getProgramById(selectedProgramId)));
    selectors.deleteButton.addEventListener("click", deleteSelectedProgram);
    selectors.clearFiltersButton.addEventListener("click", () => {
      selectors.dvdNumberInput.value = "";
      selectors.broadcastDateInput.value = "";
      selectors.titleInput.value = "";
      selectors.tagInput.value = "";
      selectors.excludeTagInput.value = "";
      renderProgramList();
    });

    selectors.recordForm.addEventListener("submit", (event) => {
      event.preventDefault();
      saveProgram(new FormData(selectors.recordForm));
      closeModals();
      renderProgramList();
      if (selectedProgramId) openDetail(selectedProgramId);
    });

    document.querySelectorAll("[data-close-modal]").forEach((button) => button.addEventListener("click", closeModals));
    [selectors.detailModal, selectors.formModal].forEach((modal) => {
      modal.addEventListener("click", (event) => { if (event.target === modal) closeModals(); });
    });
    document.addEventListener("keydown", (event) => { if (event.key === "Escape") closeModals(); });

    selectors.toolbarToggle.addEventListener("click", () => setToolbarExpanded(selectors.toolbarContent.hidden));
    selectors.toolbarOpenFixed.addEventListener("click", () => setToolbarVisible(true));

    renderProgramList();
  </script>
</body>
</html>
